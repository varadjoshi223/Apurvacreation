<!DOCTYPE html>
<html>
<head>
  <style>
    body { font-family: sans-serif; background: #FAF7F2; padding: 20px; }
    .grid { display: grid; grid-template-cols: repeat(auto-fill, minmax(300px, 1fr)); gap: 20px; }
    .card { background: white; border: 1px solid #ccc; padding: 10px; border-radius: 8px; text-align: center; }
    img { max-width: 100%; height: 300px; object-fit: contain; }
    h3 { font-size: 14px; word-break: break-all; }
  </style>
</head>
<body>
  <h1>Image Inspector - Visual Poetics</h1>
  <div class="grid">
    <div class="card">
      <img src="images/vp1.png" />
      <h3>vp1.png</h3>
    </div>
    <div class="card">
      <img src="images/vp2.png" />
      <h3>vp2.png</h3>
    </div>
    <div class="card">
      <img src="images/vp3.png" />
      <h3>vp3.png</h3>
    </div>
  </div>
</body>
</html>
